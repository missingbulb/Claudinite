# Thin launcher only — the logic lives in engine/checks/ (see engine/checks/README.md).
name: Checks CI
on:
  pull_request:
  push:
    branches: [main]
defaults:
  run:
    shell: bash
jobs:
  test-and-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the PR's real head, not the synthetic refs/pull/N/merge commit
          # actions/checkout uses by default — otherwise HEAD is an ephemeral merge of
          # the branch into main, which the work-scoped squash-merge-history check would
          # (correctly, for that synthetic commit) flag. This makes CI evaluate exactly
          # what the local Stop hook does: the branch tip. Falls back to github.sha on push.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Unit tests
        # engine-tests/ mirrors engine/ (checks runner + cross-pack detect test, mount, pack/skill machinery); packs-tests/ and skills-tests/ mirror each pack's / skill's own tests; the home's own local packs keep theirs in-tree (.claudinite/local_packs/ — the promote-scope gate test rides the canon-curation local pack); routines/fleet/ carries the planner engine tests.
        run: node --test engine-tests/*/*.test.mjs packs-tests/*/*.test.mjs skills-tests/*/*.test.mjs routines/*/*.test.mjs .claudinite/local_packs/*/*.test.mjs
      - name: Conformance sweep
        run: node engine/checks/run.mjs
      - name: Promote write-surface gate
        # The growth promote stage (.claudinite/local_packs/canon-curation/promote.md) is the one change
        # bounded to packs/ + skills/ (and their -tests trees) — an ordinary engine PR legitimately
        # edits engine/, routines/, so this cannot run on every PR. It keys on the promote branch prefix
        # (promote.md pins it) and fails the promote PR if a changed path strays.
        if: contains(github.head_ref, 'growth-promote')
        run: node .claudinite/local_packs/canon-curation/promote-scope.mjs
