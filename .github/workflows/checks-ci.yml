# Thin launcher only — the logic lives in checks/ (see checks/README.md).
name: Checks CI
on:
  pull_request:
  push:
    branches: [main]
defaults:
  run:
    shell: bash
jobs:
  test-and-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the PR's real head, not the synthetic refs/pull/N/merge commit
          # actions/checkout uses by default — otherwise HEAD is an ephemeral merge of
          # the branch into main, which the work-scoped squash-merge-history check would
          # (correctly, for that synthetic commit) flag. This makes CI evaluate exactly
          # what the local Stop hook does: the branch tip. Falls back to github.sha on push.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Unit tests
        # checks/test/ = engine + the cross-pack detect test; each pack/skill carries its own pack.test.mjs / *.test.mjs; routines/fleet/ carries the planner engine tests; growth/ carries the promote-scope gate test; mount/ carries the SessionStart orchestrator test.
        run: node --test checks/test/*.test.mjs packs/*.test.mjs packs/*/*.test.mjs skills/*.test.mjs skills/*/*.test.mjs routines/*/*.test.mjs growth/*.test.mjs mount/*.test.mjs
      - name: Conformance sweep
        run: node checks/run.mjs
      - name: Promote write-surface gate
        # The growth promote phase (growth/promote.md) is the one change bounded to
        # packs/ + skills/ — an ordinary engine PR legitimately edits growth/, checks/,
        # routines/, so this cannot run on every PR. It keys on the promote branch prefix
        # (growth/promote.md pins it) and fails the promote PR if a changed path strays.
        if: contains(github.head_ref, 'growth-promote')
        run: node growth/promote-scope.mjs
