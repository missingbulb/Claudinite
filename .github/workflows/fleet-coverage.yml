# Dispatch-only executor — deliberately NO schedule. The fleet bootstrap sweep
# (routines/auto-fleet-bootstrap.md, Step 1), orchestrated nightly from Claude
# Code, triggers this via workflow_dispatch as its fleet-credentialed census
# arm; the owner can also run it manually. Giving this a cron would make it a
# second orchestrator competing with the one scheduled routine.
# The census logic lives in routines/check-fleet-coverage.mjs.
#
# Needs the FLEET_GITHUB_TOKEN repo secret: a fine-grained PAT for this account
# covering ALL repositories with Contents + Metadata (read) and Issues
# (read/write). The default GITHUB_TOKEN sees only this repo, which defeats a
# fleet-wide census — the run fails with a pointed message until the secret exists.
name: Fleet Coverage
on:
  workflow_dispatch:
defaults:
  run:
    shell: bash
permissions:
  contents: read
jobs:
  census:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enumerate the fleet, converge adoption issues, and emit the work plan
        env:
          FLEET_GITHUB_TOKEN: ${{ secrets.FLEET_GITHUB_TOKEN }}
        run: node routines/check-fleet-coverage.mjs
      - name: Upload the work plan
        if: always() # the plan is written even on a partial run; the orchestrator reads it
        uses: actions/upload-artifact@v4
        with:
          name: fleet-plan
          path: plan.json
          if-no-files-found: warn
  report-failure:
    needs: census
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: missingbulb/Claudinite/.github/actions/report-failure@main
        with:
          workflow: "Fleet Coverage"
