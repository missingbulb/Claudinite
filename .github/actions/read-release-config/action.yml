name: Read release config
description: >-
  Resolves a Chrome-extension repo's release configuration — from the caller
  repo's optional `.github/release.config` plus the standard's defaults — and
  exposes it as step outputs. A composite action (not a reusable workflow) so it
  adds no reusable-workflow nesting level; runs in the caller's checkout, so it
  reads the caller's own config and derives the zip name from the repo name. The
  release reusable workflows call it instead of taking repo values as inputs, so
  the per-repo stub carries only triggers.

outputs:
  manifest_path:
    description: Path of the extension manifest (the version source of truth)
    value: ${{ steps.cfg.outputs.manifest_path }}
  package_json_path:
    description: Path of the package.json kept in sync with the manifest
    value: ${{ steps.cfg.outputs.package_json_path }}
  setup_command:
    description: Dependency-install command ("" skips install)
    value: ${{ steps.cfg.outputs.setup_command }}
  test_command:
    description: The full release test gate
    value: ${{ steps.cfg.outputs.test_command }}
  build_command:
    description: Command that produces the zip
    value: ${{ steps.cfg.outputs.build_command }}
  zip_name:
    description: Stable release asset filename (kebab repo name + .zip)
    value: ${{ steps.cfg.outputs.zip_name }}
  zip_path:
    description: Repo-relative path build_command writes the zip to
    value: ${{ steps.cfg.outputs.zip_path }}
  ship_paths:
    description: Space-separated shipped roots (the daily change filter)
    value: ${{ steps.cfg.outputs.ship_paths }}

runs:
  using: composite
  steps:
    - id: cfg
      shell: bash
      env:
        REPO_NAME: ${{ github.event.repository.name }}
      run: node "${{ github.action_path }}/read-config.mjs"
