name: "Release: Publish to Chrome Web Store"

# Thin stub of the chrome-extension-release standard: the logic lives in the
# Claudinite canon as a reusable workflow (referenced @main, so canon changes
# apply here automatically). This file owns only the dispatch trigger and this
# repo's values.
#
# Run it manually from the Actions tab ("Run workflow") once a release package
# exists and you're ready to ship it to users. The daily auto-release also
# publishes, but through the canon workflows directly — not through this stub.
#
# The /privacy/ page is (re)deployed as part of every publish, from the same
# PRIVACY.md the listing points at — no separate privacy workflow or option.
#
# secrets: inherit passes the four CHROME_* store secrets (see the
# chrome-extension release standard in Claudinite) into the canon workflow.
#
# Per-repo substitution points (chrome-extension-release standard):
#   __ZIP_NAME__   the stable zip name (kebab-cased repo name + .zip)
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (blank = latest release)"
        required: false
        type: string
      auto_publish:
        description: "Publish to users after upload (uncheck to leave it as a draft in the dashboard)"
        type: boolean
        default: true

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  publish:
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-publish-store.yml@main
    with:
      tag: ${{ inputs.tag }}
      auto_publish: ${{ inputs.auto_publish }}
      zip_name: __ZIP_NAME__
    secrets: inherit
