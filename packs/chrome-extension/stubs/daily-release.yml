name: "Release: Daily Auto-Release"

# Thin stub of the chrome-extension-release standard: the logic lives in the
# Claudinite canon as a reusable workflow (referenced @main, so canon changes
# apply here automatically). This file owns only the schedule/dispatch
# triggers, the concurrency guard, and this repo's values.
#
# What the workflow does — the shipped-file diff against the latest release
# tag, the patch bump pushed to main, the calls into the release and publish
# workflows — is documented in the called workflow.
#
# Per-repo substitution points (chrome-extension-release standard):
#   __ZIP_NAME__             the stable zip name (kebab-cased repo name + .zip)
#   __BUMP_PATCH_CMD__       e.g. node dev/build/release/bump-patch-version.js .
#   __FILTER_SHIPPED_CMD__   e.g. node dev/build/release/filter-shipped-paths.js
#   (both commands must be dependency-free — they run on a bare runner, no
#   npm ci)
#   with:-overrides          forward the same manifest_path / package_json_path /
#                            setup_command / test_command / build_command /
#                            build_env overrides the repo's release.yml stub
#                            passes, if any — the daily release runs the same
#                            gate and build.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

# A manual dispatch overlapping the scheduled run would race the bump-push;
# queue it instead.
concurrency: daily-release

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  daily-release:
    uses: missingbulb/Claudinite/.github/workflows/chrome-extension-daily-release.yml@main
    with:
      bump_command: __BUMP_PATCH_CMD__
      filter_command: __FILTER_SHIPPED_CMD__
      zip_path: dist/__ZIP_NAME__
      zip_name: __ZIP_NAME__
      manifest_path: extension/manifest.json
    secrets: inherit
